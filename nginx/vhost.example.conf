# The two nginx server blocks this project needs: the frontend container
# (:3000) and Directus (:8055). Add them to the server's nginx config and
# obtain certificates — see the private server repo for the server-level
# nginx/Certbot setup (shared config file, certbot --expand, reload).
#
# Replace the {{ domain }} / {{ cms_subdomain }} placeholders. Only `listen 80`
# is declared here; Certbot adds the `listen 443 ssl` + certificate lines and
# the http->https redirects.

# Frontend (Nuxt) -> the frontend container on :3000
server {
    server_name {{ domain }};

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 80;
    listen [::]:80;
}

# Directus (CMS) -> the directus container on :8055
server {
    server_name {{ cms_subdomain }};

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Larger body size for Directus uploads
        client_max_body_size 100M;
    }

    listen 80;
    listen [::]:80;
}